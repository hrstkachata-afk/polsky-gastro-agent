name: Polsky gastro lead finder

on:
  workflow_dispatch:

jobs:
  find-and-push-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find public Polish leads
        run: npm run leads -- --max-queries=5 --max-results=10 --max-pages=40

      - name: Build review pack
        run: npm run review-pack

      - name: Create Trello cards
        run: npm run trello-cards
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
          MAX_TRELLO_CARDS: "10"

      - name: Create GitHub review issues
        run: npm run review-issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_REVIEW_ISSUES: "10"

      - name: Save lead output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polsky-leads-output
          path: |
            outbox/leads/*
            outbox/review/*
          if-no-files-found: ignore
