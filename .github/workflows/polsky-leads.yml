name: Polsky gastro lead finder

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 6 * * 1-5"
  workflow_dispatch:

jobs:
  find-and-push-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/spreadsheets
          workload_identity_provider: projects/799250032013/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: polsky-gastro-agent@cobalt-alchemy-499219-h7.iam.gserviceaccount.com

      - name: Find public Polish leads
        run: npm run leads -- --max-queries=5 --max-results=10 --max-pages=40

      - name: Append new leads to Google Sheets
        run: npm run leads:push
        env:
          GOOGLE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GOOGLE_SHEET_ID: "1kRlaL8SDIpluta9r7q4HSqbjblGAA9GIPNv5JAUDdNQ"
          GOOGLE_SHEET_RANGE: "List 1!A:Y"

      - name: Save lead output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polsky-leads-output
          path: outbox/leads/*
          if-no-files-found: ignore
